<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Energy Lasts Forever</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <style>
    .product-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 0 20px;
    }

    .product {
      flex: 0 0 150px;
      text-align: center;
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 0;
    }

    .product h2 {
      font-size: 0.6rem;
      margin-bottom: 8px;
      color: white;
      letter-spacing: 1px;
    }

    .product-flip {
      position: relative;
      width: 150px;
      height: 140px;
      margin: 0 auto;
      cursor: pointer;
    }

    .product-flip img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s ease;
      border-radius: 4px;
    }

    .product-flip .back {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    .product-flip:hover .front { opacity: 0; }
    .product-flip:hover .back { opacity: 1; }

    .collection-title {
      text-align: center;
      color: #800080;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 1rem;
      padding: 10px 0 20px;
    }

    @media (max-width: 600px) {
      .product { flex: 0 0 120px; }
      .product-flip { width: 120px; height: 110px; }
      .product-flip img { height: 110px; }
    }
  </style>
</head>
<body>
  <header></header>
  <main id="home">
    <section class="hero">
      <a href="/">
        <img src="/el4e v5.png" class="hero-image" alt="Energy Lasts Forever Logo" />
      </a>
      <nav>
        <ul class="stacked-links" style="list-style: none; padding: 0; margin: 0;">
          <li><a href="/about.html">EnergyLastsForever</a></li>
          <li><a href="/gallery.html">Gallery</a></li>
        </ul>
      </nav>
    </section>

    <p class="collection-title">Official Collection</p>

    <div class="product-grid">

      <div class="product">
        <h2>Space Black</h2>
        <a href="/products/space black.html">
          <div class="product-flip">
            <img class="front" src="/mockups/BlackEssentialsTeeFront.png" alt="Black Essentials Tee Front" />
            <img class="back" src="/mockups/BlackBack.png" alt="Black Essentials Tee Back" />
          </div>
        </a>
      </div>

      <div class="product">
        <h2>White Jelly</h2>
        <a href="/products/white jelly.html">
          <div class="product-flip">
            <img class="front" src="/mockups/WhiteJellyFront.png" alt="White Jelly Tee Front" />
            <img class="back" src="/mockups/WhiteJellyBack.png" alt="White Jelly Tee Back" />
          </div>
        </a>
      </div>

      <div class="product">
        <h2>Hooded Sweatshirt</h2>
        <a href="/products/bolt hoodie.html">
          <div class="product-flip">
            <img class="front" src="/mockups/BlackHoodieFront.png" alt="Black Hoodie Front" />
            <img class="back" src="/mockups/BlackHoodieBack.png" alt="Black Hoodie Back" />
          </div>
        </a>
      </div>

      <div class="product">
        <h2>Rain Drop</h2>
        <a href="/products/v2 rain drop.html">
          <div class="product-flip">
            <img class="front" src="/mockups/drop back.png" alt="Rain Drop Front" />
            <img class="back" src="/mockups/drop front.png" alt="Rain Drop Back" />
          </div>
        </a>
      </div>

      <div class="product">
        <h2>White Trees</h2>
        <a href="/products/v2 tree.html">
          <div class="product-flip">
            <img class="front" src="/mockups/tre front.png" alt="Tree Front" />
            <img class="back" src="/mockups/tre back.png" alt="Tree Back" />
          </div>
        </a>
      </div>

      <div class="product">
        <h2>Blank Carpet</h2>
        <a href="/products/blank carpet.html">
          <div class="product-flip">
            <img class="front" src="/mockups/white blank front.png" alt="Blank Carpet Front" />
            <img class="back" src="/mockups/carpet back.png" alt="Blank Carpet Back" />
          </div>
        </a>
      </div>

      <div class="product">
        <h2>Sticker</h2>
        <a href="/products/product7.html">
          <div class="product-flip">
            <img class="front" src="/mockups/el4e sticker.png" alt="Sticker" />
          </div>
        </a>
      </div>

      <div class="product">
        <h2>NYC Subway Hoodie</h2>
        <a href="/products/nyc subway hoodie.html">
          <div class="product-flip">
            <img class="front" src="/mockups/sub hoodie.png" alt="NYC Subway Hoodie Front" />
            <img class="back" src="/mockups/sub hoodie back.png" alt="NYC Subway Hoodie Back" />
          </div>
        </a>
      </div>

    </div>
  </main>

  <footer>
    <div class="social-icons">
      <a href="https://www.instagram.com/energylastsforever/" target="_blank" aria-label="Instagram">
        <img src="/icons/insta.png" alt="Instagram Icon" />
      </a>
    </div>
  </footer>
</body>
</html>
