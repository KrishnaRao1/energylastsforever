<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Energy Lasts Forever</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />

  <style>
    .product-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 30px;
      padding: 0 10px;
    }

    .product {
      flex: 0 0 30%;
      text-align: center;
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 0;
    }

    .product h2 { margin-bottom: 10px; }

    .product-flip {
      position: relative;
      width: 250px;
      margin: 0 auto;
      cursor: pointer;
    }

    .product-flip img {
      width: 100%;
      height: auto;
      display: block;
      transition: opacity 0.4s ease;
    }

    .product-flip .back {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    .product-flip:hover .front { opacity: 0; }
    .product-flip:hover .back { opacity: 1; }

    @media (max-width: 900px) { .product { flex: 0 0 45%; } }
    @media (max-width: 600px) { .product { flex: 0 0 90%; } }
  </style>
</head>
<body>
  <header></header>

  <main id="home">
    <section class="hero">
      <a href="/">
        <img src="/el4e v4.png" class="hero-image" alt="Energy Lasts Forever Logo" />
      </a>
      <nav>
        <ul class="stacked-links" style="list-style: none; padding: 0; margin: 0;">
          <li><a href="/about.html">EnergyLastsForever</a></li>
          <li><a href="/gallery.html">Gallery</a></li>
        </ul>
      </nav>
    </section>

    <section class="hero">
      <h1>Official Collection</h1>

      <div class="product-grid">

        <div class="product">
          <h2>Space Black Essentials Tee <br>(Sold out)</h2>
          <a href="/products/space black.html">
            <div class="product-flip">
              <img class="front" src="/mockups/BlackEssentialsTeeFront.png" alt="Black Essentials Tee Front" />
              <img class="back" src="/mockups/BlackBack.png" alt="Black Essentials Tee Back" />
            </div>
          </a>
        </div>

        <div class="product">
          <h2>White Jelly Essentials Tee <br>(Sold out)</h2>
          <a href="/products/white jelly.html">
            <div class="product-flip">
              <img class="front" src="/mockups/WhiteJellyFront.png" alt="White Jelly Tee Front" />
              <img class="back" src="/mockups/WhiteJellyBack.png" alt="White Jelly Tee Back" />
            </div>
          </a>
        </div>

        <div class="product">
          <h2>Hooded Sweatshirt <br>(Sold out)</h2>
          <a href="/products/bolt hoodie.html">
            <div class="product-flip">
              <img class="front" src="/mockups/BlackHoodieFront.png" alt="Black Hoodie Front" />
              <img class="back" src="/mockups/BlackHoodieBack.png" alt="Black Hoodie Back" />
            </div>
          </a>
        </div>

        <div class="product">
          <h2>V2 Rain Drop Tee</h2>
          <a href="/products/v2 rain drop.html">
            <div class="product-flip">
              <img class="front" src="/mockups/drop back.png" alt="Rain Drop Front" />
              <img class="back" src="/mockups/drop front.png" alt="Rain Drop Back" />
            </div>
          </a>
        </div>

        <div class="product">
          <h2>V2 Tree</h2>
          <a href="/products/v2 tree.html">
            <div class="product-flip">
              <img class="front" src="/mockups/tree front.png" alt="Tree Front" />
              <img class="back" src="/mockups/tree back.png" alt="Tree Back" />
            </div>
          </a>
        </div>

      </div>
    </section>
  </main>

  <footer>
    <div class="social-icons">
      <a href="https://www.instagram.com/energylastsforever/" target="_blank" aria-label="Instagram">
        <img src="/icons/Instagram.png" alt="Instagram Icon" />
      </a>
    </div>
  </footer>

</body>
</html>
