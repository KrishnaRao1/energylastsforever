  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    main#home {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .side-logos {
      position: fixed;
      top: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2px;
      z-index: 100;
      pointer-events: none;
    }
    .side-logos.left { left: 5px; }
    .side-logos.right { right: 5px; }
    .side-logos a { pointer-events: all; }
    .side-logos img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.2s;
      display: block;
    }
    .side-logos img:hover { opacity: 1; transform: scale(1.1); }

    @media (max-width: 768px) { .side-logos { display: none; } }
  </style>
</head>

  <footer></footer>

  <script>
    function updateDateTime() {
      const optionsDate = { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'America/Los_Angeles' };
      const now = new Date();
      const date = new Intl.DateTimeFormat('en-US', optionsDate).format(now);
      const hours = now.getHours() % 12 || 12;
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const period = now.getHours() >= 12 ? 'pm' : 'am';
      document.getElementById('dateTime').textContent = `${date} ${hours}:${minutes}${period} PT, CA`;
    }
    setInterval(updateDateTime, 60000);
    updateDateTime();
  </script>
