  <title>AI Stat Collector - Energy Lasts Forever</title>

  <style>
    /* Stock ticker — minimal, scoped styles */
    .stock-ticker {
      overflow: hidden;
      background: #0d1017;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0.7rem 0;
      position: relative;
      margin: 1rem 0;
    }
    .stock-ticker-track {
      display: flex;
      gap: 2.5rem;
      width: max-content;
      animation: stockScroll 50s linear infinite;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding-left: 2rem;
    }
    @keyframes stockScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .stock-item {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
      color: #e8eaf0;
    }
